<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 112" role="img" aria-labelledby="title desc">
  <title id="title">Diesel Dandy</title>
  <desc id="desc">Logo de repuestos Diesel Dandy con piston, engranaje y colores negro, naranja, blanco y gris metalico.</desc>
  <defs>
    <linearGradient id="orange" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ff9a18"/>
      <stop offset="0.5" stop-color="#ff6a00"/>
      <stop offset="1" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.35" stop-color="#b9c0ca"/>
      <stop offset="0.7" stop-color="#59606b"/>
      <stop offset="1" stop-color="#f4f5f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="500" height="112" rx="22" fill="#050608"/>
  <path d="M0 84H500V112H0Z" fill="#0e1117"/>
  <path d="M320 0H356L310 112H274Z" fill="url(#orange)" opacity="0.95"/>
  <path d="M344 0H352L306 112H298Z" fill="#fff" opacity="0.16"/>
  <path d="M18 87H260" stroke="#ff6a00" stroke-width="2" opacity="0.65"/>
  <g filter="url(#shadow)">
    <g transform="translate(22 18)">
      <circle cx="38" cy="38" r="34" fill="#111827" stroke="url(#metal)" stroke-width="6"/>
      <circle cx="38" cy="38" r="25" fill="#050608" stroke="url(#orange)" stroke-width="5"/>
      <g fill="url(#metal)">
        <rect x="34" y="-1" width="8" height="13" rx="2"/>
        <rect x="34" y="64" width="8" height="13" rx="2"/>
        <rect x="-1" y="34" width="13" height="8" rx="2"/>
        <rect x="64" y="34" width="13" height="8" rx="2"/>
        <rect x="58" y="10" width="8" height="13" rx="2" transform="rotate(45 62 16.5)"/>
        <rect x="10" y="58" width="8" height="13" rx="2" transform="rotate(45 14 64.5)"/>
        <rect x="10" y="10" width="8" height="13" rx="2" transform="rotate(-45 14 16.5)"/>
        <rect x="58" y="58" width="8" height="13" rx="2" transform="rotate(-45 62 64.5)"/>
      </g>
      <g transform="translate(23 18) rotate(-28 18 25)">
        <rect x="10" y="0" width="25" height="24" rx="4" fill="url(#metal)" stroke="#050608" stroke-width="2"/>
        <rect x="13" y="4" width="19" height="3" fill="#ffffff" opacity="0.7"/>
        <rect x="14" y="10" width="17" height="3" fill="#111827" opacity="0.8"/>
        <rect x="20" y="22" width="6" height="36" rx="3" fill="url(#metal)" stroke="#050608" stroke-width="2"/>
        <circle cx="23" cy="61" r="9" fill="#050608" stroke="url(#metal)" stroke-width="5"/>
      </g>
    </g>
  </g>
  <g transform="translate(114 21)">
    <text x="0" y="18" fill="#f8fafc" font-family="Arial Black, Impact, sans-serif" font-size="20" font-weight="900">REPUESTOS</text>
    <text x="0" y="59" fill="url(#orange)" font-family="Arial Black, Impact, sans-serif" font-size="44" font-weight="900">DIESEL</text>
    <text x="184" y="59" fill="#f8fafc" font-family="Arial Black, Impact, sans-serif" font-size="44" font-weight="900">DANDY</text>
    <text x="2" y="83" fill="#d1d5db" font-family="Arial, sans-serif" font-size="13" font-weight="700">CALIDAD Y CONFIANZA EN CADA REPUESTO</text>
    <path d="M0 68H286" stroke="url(#orange)" stroke-width="3"/>
  </g>
</svg>
